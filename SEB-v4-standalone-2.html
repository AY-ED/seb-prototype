<!doctype html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>運動旅遊 v4 · AsiaYo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>/* =======================================================================
   AsiaYo Design System — Colors & Type
   Extracted from `ui-library-master/src/theme/**`
   ======================================================================= */

/* ---- Webfonts removed for standalone export. Falls back to system CJK fonts. */
/* (Noto Sans Google Fonts import removed.) */

/* ---- AsiaYo icon fonts removed (404 in production); the page uses Material Symbols instead. */

:root {
  /* ---------- NEUTRAL (shared) ---------- */
  --ay-neutral-0: #ffffff;
  --ay-neutral-1: #fafafa;
  --ay-neutral-2: #f5f5f5;
  --ay-neutral-3: #e8e8e8;
  --ay-neutral-4: #d9d9d9;
  --ay-neutral-5: #bfbfbf;
  --ay-neutral-6: #8c8c8c;
  --ay-neutral-7: #595959;
  --ay-neutral-8: #262626;
  --ay-neutral-9: #000000;

  /* ---------- SUCCESS ---------- */
  --ay-success-0: #efffef;
  --ay-success-1: #ddf7dc;
  --ay-success-2: #baf0b9;
  --ay-success-3: #a0e09e;
  --ay-success-4: #60cc5d;
  --ay-success-5: #04ad00;
  --ay-success-6: #088c37;
  --ay-success-7: #016628;
  --ay-success-8: #00401b;
  --ay-success-9: #001a0b;

  /* ---------- WARNING ---------- */
  --ay-warning-0: #fffce6;
  --ay-warning-1: #fff0a3;
  --ay-warning-2: #ffe47a;
  --ay-warning-3: #ffd752;
  --ay-warning-4: #ffc629;
  --ay-warning-5: #ffb300;
  --ay-warning-6: #d99100;
  --ay-warning-7: #b37100;
  --ay-warning-8: #8c5400;
  --ay-warning-9: #663a00;

  /* ---------- DANGER ---------- */
  --ay-danger-0: #fff3eb;
  --ay-danger-1: #ffd8c2;
  --ay-danger-2: #ffbb99;
  --ay-danger-3: #ff9b70;
  --ay-danger-4: #ff7847;
  --ay-danger-5: #f4511e;
  --ay-danger-6: #cf350e;
  --ay-danger-7: #a81f03;
  --ay-danger-8: #821100;
  --ay-danger-9: #5c0900;

  /* ---------- INDIGO (illustration / secondary accent) ---------- */
  --ay-indigo-0: #eceff1;
  --ay-indigo-1: #cfd8dc;
  --ay-indigo-2: #b0bec5;
  --ay-indigo-3: #90a4ae;
  --ay-indigo-4: #78909c;
  --ay-indigo-5: #607d8b;
  --ay-indigo-6: #546e7a;
  --ay-indigo-7: #455a64;
  --ay-indigo-8: #37474f;
  --ay-indigo-9: #263238;

  /* ---------- USAGE: MOMO (co-brand) ---------- */
  --ay-momo-0: #D62872;
  --ay-momo-1: #B0195F;
  --ay-momo-2: #8A0C4B;

  /* ---------- CP (Consumer Product, traveller-facing) primary: cyan/blue ---------- */
  --ay-cp-primary-0: #f0fdff;
  --ay-cp-primary-1: #c7f7ff;
  --ay-cp-primary-2: #99e6f7;
  --ay-cp-primary-3: #6ccfeb;
  --ay-cp-primary-4: #43b7de;
  --ay-cp-primary-5: #1e9fd2;  /* CP main.base */
  --ay-cp-primary-6: #0f7aab;
  --ay-cp-primary-7: #055885;
  --ay-cp-primary-8: #003a5e;
  --ay-cp-primary-9: #002138;

  /* ---------- HOST (supplier portal) primary: teal ---------- */
  --ay-host-primary-0: #E8F7F6;
  --ay-host-primary-1: #BCE9E4;
  --ay-host-primary-2: #90DAD3;
  --ay-host-primary-3: #63CBC2;
  --ay-host-primary-4: #37BDB0;
  --ay-host-primary-5: #21B6A8;
  --ay-host-primary-6: #20AEA1;  /* Host main.base */
  --ay-host-primary-7: #1DA094;
  --ay-host-primary-8: #198C82;
  --ay-host-primary-9: #15756C;

  /* ---------- SEMANTIC ---------- */
  /* By default we expose CP theme. Flip via [data-ay-theme="host"] on html/body. */
  --ay-primary-0: var(--ay-cp-primary-0);
  --ay-primary-1: var(--ay-cp-primary-1);
  --ay-primary-2: var(--ay-cp-primary-2);
  --ay-primary-3: var(--ay-cp-primary-3);
  --ay-primary-4: var(--ay-cp-primary-4);
  --ay-primary-5: var(--ay-cp-primary-5);
  --ay-primary-6: var(--ay-cp-primary-6);
  --ay-primary-7: var(--ay-cp-primary-7);
  --ay-primary-8: var(--ay-cp-primary-8);
  --ay-primary-9: var(--ay-cp-primary-9);
  --ay-main: var(--ay-cp-primary-5);

  --ay-fg-1: var(--ay-neutral-8); /* headings */
  --ay-fg-2: var(--ay-neutral-7); /* body */
  --ay-fg-3: var(--ay-neutral-6); /* muted */
  --ay-fg-4: var(--ay-neutral-5); /* placeholder / disabled */
  --ay-bg-surface: var(--ay-neutral-0);
  --ay-bg-subtle:  var(--ay-neutral-1);
  --ay-bg-muted:   var(--ay-neutral-2);
  --ay-border:     var(--ay-neutral-5);
  --ay-divider:    var(--ay-neutral-3);

  /* ---------- TYPOGRAPHY ---------- */
  /* Default locale is TW (繁中). Override by setting lang="en|hk|sc|jp|kr|th" on
     <html> or a subtree, OR by setting --ay-font-sans directly on a container. */
  --ay-font-sans: 'Noto Sans TC', 'Noto Sans', -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', 'Segoe UI', Roboto, sans-serif;

  /* ---- Type scale (from Zeroheight / Ark Design System) ---- */
  /* Headings — Main title */
  --ay-fs-h1: 48px;  /* H1 / 700 */
  --ay-fs-h2: 32px;  /* H2 / 700 */
  --ay-fs-h3: 24px;  /* H3 / 700 */
  --ay-fs-h4: 20px;  /* H4 / 700 */
  --ay-fs-h5: 16px;  /* H5 / 700 */
  --ay-fs-h6: 14px;  /* H6 / 700 */
  /* Sub-title — Medium */
  --ay-fs-m1: 16px;  /* M1 / 500 */
  --ay-fs-m2: 14px;  /* M2 / 500 */
  /* Body — Paragraph */
  --ay-fs-p1: 16px;  /* P1 / 400 */
  --ay-fs-p2: 14px;  /* P2 / 400 */
  --ay-fs-p3: 12px;  /* P3 / 400 */

  /* Legacy aliases kept for existing components (Alert, Tag, Button …) */
  --ay-fs-0: 12px;  /* = P3 */
  --ay-fs-1: 14px;  /* = H6 / M2 / P2 */
  --ay-fs-2: 16px;  /* = H5 / M1 / P1 */
  --ay-fs-3: 20px;  /* = H4 */
  --ay-fs-4: 24px;  /* = H3 */
  --ay-fs-5: 32px;  /* = H2 */
  --ay-fs-6: 48px;  /* = H1 */

  --ay-fw-regular: 400;
  --ay-fw-medium: 500;
  --ay-fw-bold: 700;

  /* ---------- SPACING (4px base) ---------- */
  --ay-s-0: 0px;    --ay-s-0-5: 2px;
  --ay-s-1: 4px;    --ay-s-1-5: 6px;
  --ay-s-2: 8px;    --ay-s-2-5: 10px;
  --ay-s-3: 12px;   --ay-s-3-5: 14px;
  --ay-s-4: 16px;   --ay-s-4-5: 18px;
  --ay-s-5: 20px;   --ay-s-5-5: 22px;
  --ay-s-6: 24px;   --ay-s-7: 28px; --ay-s-7-5: 30px;
  --ay-s-8: 32px;   --ay-s-9: 36px;
  --ay-s-10: 40px;  --ay-s-11: 44px;
  --ay-s-12: 48px;  --ay-s-13: 52px;
  --ay-s-14: 56px;  --ay-s-15: 60px;
  --ay-s-16: 64px;  --ay-s-18: 72px;
  --ay-s-20: 80px;
  --ay-s-xxs: 4px; --ay-s-xs: 8px; --ay-s-s: 16px; --ay-s-m: 24px; --ay-s-l: 48px; --ay-s-xl: 96px;

  /* ---------- RADII ---------- */
  --ay-r-0: 4px;
  --ay-r-1: 8px;
  --ay-r-2: 16px;
  --ay-r-small: 16px;
  --ay-r-medium: 20px;
  --ay-r-large: 24px;
  --ay-r-pill: 100px;

  /* ---------- SHADOWS (z-stacked, all rgba(0,0,0,.08)) ---------- */
  --ay-shadow-raised:       0 1px 2px rgba(0, 0, 0, 0.08);
  --ay-shadow-dropdown:     0 2px 4px rgba(0, 0, 0, 0.08);
  --ay-shadow-navigation:   0 3px 6px rgba(0, 0, 0, 0.08);
  --ay-shadow-header:       0 4px 8px rgba(0, 0, 0, 0.08);
  --ay-shadow-bulletin:     0 5px 10px rgba(0, 0, 0, 0.08);
  --ay-shadow-flash-notice: 0 6px 12px rgba(0, 0, 0, 0.08);
  --ay-shadow-modal:        0 7px 14px rgba(0, 0, 0, 0.08);
  --ay-shadow-dialog:       0 8px 16px rgba(0, 0, 0, 0.08);

  /* ---------- Z-INDICES ---------- */
  --ay-z-base: 0;        --ay-z-flat: 1;       --ay-z-raised: 2;
  --ay-z-overlay: 8;     --ay-z-dropdown: 1000;
  --ay-z-navigation: 1010; --ay-z-header: 1020;
  --ay-z-bulletin: 1030;   --ay-z-flash-notice: 1040;
  --ay-z-mask: 1050;       --ay-z-modal: 1060;  --ay-z-dialog: 1070;

  /* ---------- BREAKPOINTS ---------- */
  --ay-bp-mini-tablet: 768px;
  --ay-bp-tablet: 992px;
  --ay-bp-desktop: 1280px;
}

/* Theme switch: set data-ay-theme="host" on <html> or a container to re-point primary */
[data-ay-theme='host'] {
  --ay-primary-0: var(--ay-host-primary-0);
  --ay-primary-1: var(--ay-host-primary-1);
  --ay-primary-2: var(--ay-host-primary-2);
  --ay-primary-3: var(--ay-host-primary-3);
  --ay-primary-4: var(--ay-host-primary-4);
  --ay-primary-5: var(--ay-host-primary-5);
  --ay-primary-6: var(--ay-host-primary-6);
  --ay-primary-7: var(--ay-host-primary-7);
  --ay-primary-8: var(--ay-host-primary-8);
  --ay-primary-9: var(--ay-host-primary-9);
  --ay-main: var(--ay-host-primary-6);
}

/* =======================================================================
   Per-locale font family override. AsiaYo ships locale-specific Noto Sans
   variants; EN uses the base Noto Sans, TH uses Sarabun. All locales use
   the same type scale (sizes + weights).
   ======================================================================= */
[lang='en'], [lang='en-us'], [lang='en-gb'] {
  --ay-font-sans: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}
[lang='zh-tw'], [lang='zh-Hant-TW'] {
  --ay-font-sans: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
}
[lang='zh-hk'], [lang='zh-Hant-HK'] {
  --ay-font-sans: 'Noto Sans HK', -apple-system, BlinkMacSystemFont, 'PingFang HK', 'Microsoft JhengHei', sans-serif;
}
[lang='zh-cn'], [lang='zh-Hans-CN'], [lang='zh-Hans'] {
  --ay-font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
[lang='ja'], [lang='ja-JP'] {
  --ay-font-sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
}
[lang='ko'], [lang='ko-KR'] {
  --ay-font-sans: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
}
[lang='th'], [lang='th-TH'] {
  --ay-font-sans: 'Sarabun', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
}

/* =======================================================================
   Semantic type classes — mirror the Zeroheight Ark Design System spec.
   Headings (H1–H6) 700. Sub-titles (M1–M2) 500. Body (P1–P3) 400.
   Default color is fg-1 for headings/sub-titles, fg-2 for body.
   ======================================================================= */
.ay-h1 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-h1); font-weight: 700; line-height: 1.25; letter-spacing: -0.005em; }
.ay-h2 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-h2); font-weight: 700; line-height: 1.3;  }
.ay-h3 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-h3); font-weight: 700; line-height: 1.35; }
.ay-h4 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-h4); font-weight: 700; line-height: 1.4;  }
.ay-h5 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-h5); font-weight: 700; line-height: 1.5;  }
.ay-h6 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-h6); font-weight: 700; line-height: 1.55; }

.ay-m1 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-m1); font-weight: 500; line-height: 1.5;  }
.ay-m2 { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: var(--ay-fs-m2); font-weight: 500; line-height: 1.55; }

.ay-p1 { font-family: var(--ay-font-sans); color: var(--ay-fg-2); font-size: var(--ay-fs-p1); font-weight: 400; line-height: 1.6;  }
.ay-p2 { font-family: var(--ay-font-sans); color: var(--ay-fg-2); font-size: var(--ay-fs-p2); font-weight: 400; line-height: 1.6;  }
.ay-p3 { font-family: var(--ay-font-sans); color: var(--ay-fg-3); font-size: var(--ay-fs-p3); font-weight: 400; line-height: 1.5;  }

/* Legacy aliases kept so existing components don't break */
.ay-body       { font-family: var(--ay-font-sans); color: var(--ay-fg-2); font-size: var(--ay-fs-p2); font-weight: 400; line-height: 20px; }
.ay-body-lg    { font-family: var(--ay-font-sans); color: var(--ay-fg-2); font-size: var(--ay-fs-p1); font-weight: 400; line-height: 24px; }
.ay-caption    { font-family: var(--ay-font-sans); color: var(--ay-fg-3); font-size: var(--ay-fs-p3); font-weight: 400; line-height: 16px; }
.ay-title-desktop { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: 20px; font-weight: 700; line-height: 28px; }
.ay-title-mobile  { font-family: var(--ay-font-sans); color: var(--ay-fg-1); font-size: 16px; font-weight: 500; line-height: 24px; }
.ay-button-label  { font-family: var(--ay-font-sans); font-size: 14px; font-weight: 500; line-height: 20px; }
.ay-mono { font-family: 'SFMono-Regular', ui-monospace, Menlo, Consolas, monospace; font-size: 14px; line-height: 20px; color: var(--ay-fg-2); }

/* Icon helper — use with the Ay- fonts */
.ay-icon {
  font-style: normal;
  font-weight: 400;
  font-variant: normal;
  text-transform: none;
  line-height: 1;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  display: inline-block;
}
/* Material Symbols Outlined is listed FIRST so in-sandbox rendering works.
   In production you'd flip the order (or drop Material Symbols) so the
   proprietary Ay icon fonts from img.asiayo.com take priority. */
.ay-icon.ay-icon-line  { font-family: 'Material Symbols Outlined', 'Ay-Web-Icons-Line'  !important; }
.ay-icon.ay-icon-solid { font-family: 'Material Symbols Outlined', 'Ay-Web-Icons-Solid' !important; font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
.ay-icon.ay-icon-core  { font-family: 'Material Symbols Outlined', 'Ay-Icons'           !important; }
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,200..700,0..1,-50..200&display=swap');
  .ay-icon { font-family: 'Material Symbols Outlined', system-ui, sans-serif; font-weight: 400; font-style: normal; display: inline-block; line-height: 1; vertical-align: middle; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; -webkit-font-smoothing: antialiased; }
  .ay-icon-solid { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; }
  body { font-family: var(--ay-font-sans); color: var(--ay-fg-2); background: #fff; -webkit-font-smoothing: antialiased; }
  input, textarea, button { font-family: inherit; }

  /* Responsive design tokens — desktop default, tablet ≤ 1024, mobile ≤ 640 */
  :root {
    --seb-pad: 120px;          /* horizontal page padding */
    --seb-cols: 3;             /* main event card grid (3 on desktop) */
    --seb-cs-cols: 4;          /* coming-soon cards */
    --seb-trust-cols: 4;       /* trust grid */
    --seb-region-cols: 3;      /* region quick-pick */
    --seb-footer-cols: 1.4fr 1fr 1fr 1fr;
    --seb-banner-h: 320px;
    --seb-banner-title: 44px;
    --seb-banner-sub: 18px;
  }
  @media (max-width: 1280px) { :root { --seb-pad: 48px; } }
  @media (max-width: 1024px) {
    :root {
      --seb-pad: 32px; --seb-cols: 2; --seb-cs-cols: 2;
      --seb-trust-cols: 2; --seb-region-cols: 3;
      --seb-footer-cols: 1fr 1fr;
      --seb-banner-h: 260px;
      --seb-banner-title: 32px;
      --seb-banner-sub: 16px;
    }
  }
  @media (max-width: 640px) {
    :root {
      --seb-pad: 16px; --seb-cols: 1; --seb-cs-cols: 1;
      --seb-trust-cols: 2; --seb-region-cols: 1;
      --seb-footer-cols: 1fr;
      --seb-banner-h: 200px;
      --seb-banner-title: 24px;
      --seb-banner-sub: 13px;
    }
  }
  @media (max-width: 1024px) { .seb-hide-tablet { display: none !important; } }
  @media (max-width: 640px)  { .seb-hide-mobile { display: none !important; } }

  /* Banner */
  .seb-banner-arrow:hover { background: #fff !important; box-shadow: 0 4px 8px rgba(0,0,0,.12) !important; }
  .seb-banner-dot { transition: all 200ms; }

  /* Tabs */
  .seb-main-tab { transition: color 150ms, background 150ms, border-color 150ms; }
  .seb-main-tab:hover { color: var(--ay-cp-primary-5); }
  .seb-region-pill { transition: all 150ms; }
  .seb-region-pill:hover { border-color: var(--ay-cp-primary-5); color: var(--ay-cp-primary-5); }
  .seb-chip { transition: all 150ms; user-select: none; }
  .seb-chip:hover { border-color: var(--ay-cp-primary-5); }
  .seb-tab-scroller::-webkit-scrollbar { display: none; }

  /* Card */
  .seb-card { transition: box-shadow 200ms, transform 200ms; }
  .seb-card:hover { box-shadow: 0 8px 16px rgba(0,0,0,.10); transform: translateY(-2px); }
  .seb-card-soldout { filter: saturate(.4); }

  .seb-faq-item { transition: background 150ms; }
  .seb-faq-item:hover { background: var(--ay-neutral-1); }

  /* fade-in for filtered results */
  @keyframes seb-fade-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .seb-fade-in { animation: seb-fade-in 240ms ease both; }

  /* Image placeholders */
  .seb-img {
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .seb-img::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.35) 100%);
    pointer-events: none;
  }
</style>
</head>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script type="text/babel">// Shared primitives for CP kit — mirror ui-library styled patterns

const Button = ({ children, level = 'primary', styleType = 'solid', size = 'md', iconName, onClick, disabled, style = {}, ...rest }) => {
  const sizes = {
    sm: { fs: 14, lh: 20, pad: '5px 16px', icon: 14 },
    md: { fs: 16, lh: 24, pad: '7px 20px', icon: 16 },
    lg: { fs: 16, lh: 24, pad: '11px 24px', icon: 18 },
  };
  const s = sizes[size];
  const palette = {
    primary: { solid: { bg: '#1e9fd2', hover: '#0f7aab', color: '#fff', border: '#1e9fd2' },
               outline: { bg: '#fff', hover: '#f0fdff', color: '#1e9fd2', border: '#1e9fd2' },
               flat: { bg: 'transparent', hover: 'rgba(30,159,210,.08)', color: '#1e9fd2', border: 'transparent' } },
    neutral: { solid: { bg: '#bfbfbf', hover: '#8c8c8c', color: '#fff', border: '#bfbfbf' },
               outline: { bg: '#fff', hover: '#f5f5f5', color: '#595959', border: '#bfbfbf' },
               flat: { bg: 'transparent', hover: '#f5f5f5', color: '#595959', border: 'transparent' } },
    danger:  { solid: { bg: '#f4511e', hover: '#cf350e', color: '#fff', border: '#f4511e' },
               outline: { bg: '#fff', hover: '#fff3eb', color: '#f4511e', border: '#f4511e' },
               flat: { bg: 'transparent', hover: 'rgba(244,81,30,.08)', color: '#f4511e', border: 'transparent' } },
  };
  const p = (palette[level] || palette.primary)[styleType];
  const [hover, setHover] = React.useState(false);
  return (
    <button onClick={onClick} disabled={disabled}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        fontFamily: 'var(--ay-font-sans)', fontWeight: 500, cursor: disabled ? 'not-allowed' : 'pointer',
        fontSize: s.fs, lineHeight: s.lh + 'px', padding: s.pad,
        border: `1px solid ${p.border}`, borderRadius: 4,
        background: hover && !disabled ? p.hover : p.bg, color: p.color,
        opacity: disabled ? 0.48 : 1, transition: 'background-color 150ms, color 150ms',
        ...style,
      }} {...rest}>
      {iconName && <span className="ay-icon ay-icon-line" style={{ fontSize: s.icon }} dangerouslySetInnerHTML={{__html: iconName}} />}
      {children}
    </button>
  );
};

const IconButton = ({ code, onClick, shape = 'circular', size = 40, level = 'neutral', style = {} }) => {
  const [hover, setHover] = React.useState(false);
  const bg = level === 'primary' ? (hover ? '#0f7aab' : '#1e9fd2') : (hover ? '#f5f5f5' : 'transparent');
  const color = level === 'primary' ? '#fff' : '#595959';
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        width: size, height: size, display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
        borderRadius: shape === 'circular' ? 100 : 4, border: '1px solid transparent',
        background: bg, color, cursor: 'pointer', fontSize: 20,
        transition: 'background 150ms', ...style,
      }}>
      <span className="ay-icon ay-icon-line" dangerouslySetInnerHTML={{__html: code}} />
    </button>
  );
};

const Tag = ({ children, type = 'primary', styleType = 'outline', size = 'medium' }) => {
  const pal = {
    primary: { outline: { bg: '#f0fdff', border: '#1e9fd2', color: '#1e9fd2' }, solid: { bg: '#055885', border: '#055885', color: '#fff' } },
    success: { outline: { bg: '#efffef', border: '#04ad00', color: '#04ad00' }, solid: { bg: '#016628', border: '#016628', color: '#fff' } },
    warning: { outline: { bg: '#fffce6', border: '#ffb300', color: '#d99100' }, solid: { bg: '#d99100', border: '#d99100', color: '#fff' } },
    danger:  { outline: { bg: '#fff3eb', border: '#f4511e', color: '#f4511e' }, solid: { bg: '#a81f03', border: '#a81f03', color: '#fff' } },
    neutral: { outline: { bg: '#f5f5f5', border: '#bfbfbf', color: '#595959' }, solid: { bg: '#262626', border: '#262626', color: '#fff' } },
  };
  const sizes = { small: { fs: 12, lh: '16px', pad: '4px' }, medium: { fs: 14, lh: '20px', pad: '4px 8px' }, large: { fs: 16, lh: '24px', pad: '4px 8px' } };
  const p = pal[type][styleType]; const s = sizes[size];
  return <span style={{ display: 'inline-block', border: `1px solid ${p.border}`, background: p.bg, color: p.color, padding: s.pad, borderRadius: 4, fontSize: s.fs, lineHeight: s.lh }}>{children}</span>;
};

const TextField = ({ label, value, onChange, placeholder, iconCode, status = 'default', message, type = 'text', style = {} }) => {
  const statusColor = { default: '#bfbfbf', error: '#f4511e', success: '#04ad00', focus: '#1e9fd2' }[status] || '#bfbfbf';
  const [focus, setFocus] = React.useState(false);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 6, ...style }}>
      {label && <label style={{ fontSize: 12, color: '#595959', fontWeight: 500 }}>{label}</label>}
      <div style={{
        display: 'flex', alignItems: 'center',
        border: `1px solid ${focus ? '#1e9fd2' : statusColor}`, borderRadius: 4, background: '#fff',
        boxShadow: focus ? '0 0 0 2px rgba(30,159,210,.48)' : 'none',
      }}>
        {iconCode && <span className="ay-icon ay-icon-line" style={{ paddingLeft: 8, color: '#1e9fd2', fontSize: 18 }} dangerouslySetInnerHTML={{__html: iconCode}} />}
        <input type={type} value={value} onChange={onChange} placeholder={placeholder}
          onFocus={() => setFocus(true)} onBlur={() => setFocus(false)}
          style={{ flex: 1, border: 'none', outline: 'none', padding: '10px 8px', fontSize: 14, lineHeight: '20px', color: '#595959', fontFamily: 'inherit', background: 'transparent' }} />
      </div>
      {message && <div style={{ fontSize: 12, color: status === 'error' ? '#f4511e' : '#8c8c8c' }}>{message}</div>}
    </div>
  );
};

const Stepper = ({ value, onChange, min = 0, max = 20, label, sublabel }) => (
  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 0' }}>
    <div>
      <div style={{ fontSize: 14, fontWeight: 500, color: '#262626' }}>{label}</div>
      {sublabel && <div style={{ fontSize: 12, color: '#8c8c8c', marginTop: 2 }}>{sublabel}</div>}
    </div>
    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <button disabled={value <= min} onClick={() => onChange(Math.max(min, value - 1))}
        style={{ width: 32, height: 32, borderRadius: 100, border: '1px solid #bfbfbf', background: '#fff', cursor: value <= min ? 'not-allowed' : 'pointer', opacity: value <= min ? 0.48 : 1, fontSize: 18, lineHeight: 0, color: '#595959' }}>−</button>
      <div style={{ minWidth: 24, textAlign: 'center', fontSize: 14, color: '#262626', fontWeight: 500 }}>{value}</div>
      <button disabled={value >= max} onClick={() => onChange(Math.min(max, value + 1))}
        style={{ width: 32, height: 32, borderRadius: 100, border: '1px solid #1e9fd2', background: '#fff', color: '#1e9fd2', cursor: value >= max ? 'not-allowed' : 'pointer', opacity: value >= max ? 0.48 : 1, fontSize: 18, lineHeight: 0 }}>+</button>
    </div>
  </div>
);

const Checkbox = ({ checked, onChange, label, disabled }) => (
  <label style={{ display: 'inline-flex', alignItems: 'flex-start', gap: 8, cursor: disabled ? 'not-allowed' : 'pointer', color: disabled ? '#bfbfbf' : '#595959', fontSize: 14, lineHeight: '20px', opacity: disabled ? 0.8 : 1 }}>
    <span style={{ width: 16, height: 16, flexShrink: 0, borderRadius: 4, border: checked ? 'none' : '1px solid #bfbfbf', background: checked ? '#1e9fd2' : '#fff', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 12, marginTop: 2 }}>{checked ? '✓' : ''}</span>
    <span>{label}</span>
    <input type="checkbox" checked={checked} onChange={e => !disabled && onChange(e.target.checked)} style={{ display: 'none' }} />
  </label>
);

const Badge = ({ count, dot, children }) => (
  <span style={{ position: 'relative', display: 'inline-block' }}>
    {children}
    {dot ? (
      <span style={{ position: 'absolute', top: -2, right: -2, width: 8, height: 8, borderRadius: 8, background: '#f4511e', boxShadow: '0 0 0 2px #fff' }} />
    ) : count ? (
      <span style={{ position: 'absolute', top: -6, right: -6, minWidth: 16, height: 16, padding: '0 4px', borderRadius: 8, background: '#f4511e', color: '#fff', fontSize: 12, lineHeight: '16px', textAlign: 'center', boxSizing: 'border-box' }}>{count > 99 ? '99+' : count}</span>
    ) : null}
  </span>
);

const BadgeRating = ({ score, count, size = 'medium' }) => {
  const fs = size === 'small' ? 12 : size === 'large' ? 18 : 14;
  const comment = score >= 4.5 ? '極佳 · Excellent' : score >= 4 ? '很好 · Very good' : score >= 3.5 ? '好 · Good' : '一般';
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: fs, color: '#262626' }}>
      <span style={{ background: '#055885', color: '#fff', borderRadius: 4, padding: '2px 6px', fontWeight: 700 }}>{score.toFixed(1)}</span>
      <span style={{ color: '#595959', fontWeight: 500 }}>{comment}</span>
      {count && <span style={{ color: '#8c8c8c' }}>({count.toLocaleString()})</span>}
    </span>
  );
};

// Placeholder image component — deterministic gradient backgrounds
const PlaceholderImg = ({ seed = 'a', height = 160, style = {}, label }) => {
  const palettes = [
    ['#1e9fd2', '#6ccfeb'], ['#f4511e', '#ffbb99'], ['#20AEA1', '#63CBC2'],
    ['#455a64', '#90a4ae'], ['#ffb300', '#ffd752'], ['#055885', '#43b7de'],
  ];
  let h = 0; for (const c of String(seed)) h = (h * 31 + c.charCodeAt(0)) | 0;
  const [a, b] = palettes[Math.abs(h) % palettes.length];
  return (
    <div style={{ background: `linear-gradient(135deg, ${a}, ${b})`, height, borderRadius: 8, display: 'flex', alignItems: 'flex-end', padding: 10, color: 'rgba(255,255,255,.9)', fontSize: 11, fontWeight: 500, ...style }}>
      {label}
    </div>
  );
};

Object.assign(window, { Button, IconButton, Tag, TextField, Stepper, Checkbox, Badge, BadgeRating, PlaceholderImg });
</script>

<script type="text/babel">// Banner carousel — promo hero, takes over hero spot

const { useState: useStateBanner, useEffect: useEffectBanner } = React;

const Banner = () => {
  const [idx, setIdx] = useStateBanner(0);
  const [paused, setPaused] = useStateBanner(false);
  const banners = window.SEB_BANNERS;

  useEffectBanner(() => {
    if (paused) return;
    const t = setTimeout(() => setIdx((idx + 1) % banners.length), 5500);
    return () => clearTimeout(t);
  }, [idx, paused]);

  const go = (n) => setIdx((n + banners.length) % banners.length);

  return (
    <section
      style={{ background: '#fff' }}
      onMouseEnter={() => setPaused(true)}
      onMouseLeave={() => setPaused(false)}
    >
      <div style={{ position: 'relative', width: '100%', overflow: 'hidden', height: 'var(--seb-banner-h)' }}>
        {banners.map((b, i) => {
          const Wrap = b.href ? 'a' : 'div';
          const wrapProps = b.href ? { href: b.href, target: '_blank', rel: 'noopener' } : {};
          return (
          <Wrap
            key={i}
            {...wrapProps}
            className="seb-img"
            style={{
              position: 'absolute', inset: 0,
              backgroundImage: `url(${b.bg})`,
              backgroundSize: 'cover', backgroundPosition: 'center',
              opacity: i === idx ? 1 : 0,
              transition: 'opacity 600ms ease',
              pointerEvents: i === idx ? 'auto' : 'none',
              cursor: b.href ? 'pointer' : 'default',
              display: 'block',
            }}
          >
            {/* Overlay text only if a title is provided */}
            {b.title && (
              <React.Fragment>
                <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(95deg, rgba(0,33,56,.78) 0%, rgba(0,33,56,.45) 45%, rgba(0,33,56,.05) 80%)' }} />
                <div style={{ position: 'absolute', inset: 0, maxWidth: '100%', margin: '0 auto', padding: '40px var(--seb-pad)', display: 'flex', flexDirection: 'column', justifyContent: 'center', color: '#fff' }}>
                  <div style={{ maxWidth: 560 }}>
                    <div style={{ fontSize: 'var(--seb-banner-title)', lineHeight: 1.15, fontWeight: 700, letterSpacing: '-0.01em', marginBottom: 12, textShadow: '0 2px 8px rgba(0,0,0,.2)' }}>{b.title}</div>
                    {b.subtitle && <div style={{ fontSize: 'var(--seb-banner-sub)', lineHeight: 1.5, opacity: 0.95, maxWidth: 480 }}>{b.subtitle}</div>}
                  </div>
                </div>
              </React.Fragment>
            )}
          </Wrap>
        );})}

        {/* prev/next arrows */}
        <button
          className="seb-banner-arrow"
          onClick={() => go(idx - 1)}
          style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)', width: 44, height: 44, borderRadius: 100, border: 'none', background: 'rgba(255,255,255,.85)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#262626' }}>
          <span className="ay-icon ay-icon-line" style={{ fontSize: 22 }}>chevron_left</span>
        </button>
        <button
          className="seb-banner-arrow"
          onClick={() => go(idx + 1)}
          style={{ position: 'absolute', right: 16, top: '50%', transform: 'translateY(-50%)', width: 44, height: 44, borderRadius: 100, border: 'none', background: 'rgba(255,255,255,.85)', cursor: 'pointer', display: 'inline-flex', alignItems: 'center', justifyContent: 'center', color: '#262626' }}>
          <span className="ay-icon ay-icon-line" style={{ fontSize: 22 }}>chevron_right</span>
        </button>

        {/* dots */}
        <div style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
          {banners.map((_, i) => (
            <span
              key={i}
              className="seb-banner-dot"
              onClick={() => go(i)}
              style={{
                width: i === idx ? 28 : 8, height: 8, borderRadius: 100,
                background: i === idx ? '#fff' : 'rgba(255,255,255,.5)',
                cursor: 'pointer',
              }}
            />
          ))}
        </div>
      </div>
    </section>
  );
};

Object.assign(window, { Banner });
</script>
<script type="text/babel">// SEB v4 FilterBar — three-tier nav
//
//   Tier 1: mainTab (top-level category)        — non-sticky
//   Tier 2: secondTab (anchor nav per-mainTab)  — sticky under site header
//
// secondTab clicks smooth-scroll to the matching <Section>. Active state
// is driven by scroll-spy: as the user scrolls, whichever section is
// closest to the viewport top wins. Sections themselves render below.

const FilterBarV4 = ({ mainTab, setMainTab, activeSection, onSecondTabClick, sectionRefs }) => {
  const mainTabs = window.SEB_MAIN_TABS;
  const config = window.SEB_TAB_CONFIG[mainTab];
  const secondTabs = config?.secondTabs || [];

  const mainScrollerRef = React.useRef(null);
  const secondScrollerRef = React.useRef(null);
  const sentinelRef = React.useRef(null);
  const [stuck, setStuck] = React.useState(false);
  const [mainScroll, setMainScroll] = React.useState({ canL: false, canR: false });

  // Track main strip scroll bounds so we can enable/disable arrow buttons
  React.useEffect(() => {
    const el = mainScrollerRef.current;
    if (!el) return;
    const update = () => {
      setMainScroll({
        canL: el.scrollLeft > 4,
        canR: el.scrollLeft + el.clientWidth < el.scrollWidth - 4,
      });
    };
    update();
    el.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
    return () => {
      el.removeEventListener('scroll', update);
      window.removeEventListener('resize', update);
    };
  }, []);

  const scrollMain = (dir) => {
    const el = mainScrollerRef.current;
    if (!el) return;
    el.scrollBy({ left: dir * Math.max(280, el.clientWidth * 0.7), behavior: 'smooth' });
  };

  // Sticky detection for secondTab bar
  React.useEffect(() => {
    const el = sentinelRef.current;
    if (!el || !('IntersectionObserver' in window)) return;
    const io = new IntersectionObserver(
      ([entry]) => setStuck(!entry.isIntersecting),
      { rootMargin: '-60px 0px 0px 0px', threshold: 0 }
    );
    io.observe(el);
    return () => io.disconnect();
  }, []);

  // Auto-scroll the secondTab strip so the active tab stays in view
  React.useEffect(() => {
    if (!activeSection || !secondScrollerRef.current) return;
    const tabEl = secondScrollerRef.current.querySelector(`[data-stab="${activeSection}"]`);
    if (tabEl) {
      const scroller = secondScrollerRef.current;
      const tabRect = tabEl.getBoundingClientRect();
      const scrollerRect = scroller.getBoundingClientRect();
      const offset = tabRect.left - scrollerRect.left - scrollerRect.width / 2 + tabRect.width / 2;
      scroller.scrollBy({ left: offset, behavior: 'smooth' });
    }
  }, [activeSection]);

  return (
    <React.Fragment>
      {/* ===== Tier 1: mainTab — NOT sticky ===== */}
      <section style={{
        background: '#fafafa',
        borderBottom: '1px solid #f0f0f0',
        padding: '16px 0',
      }}>
        <div style={{ position: 'relative', margin: '0 var(--seb-pad)' }}>
          {/* Left arrow */}
          <button
            onClick={() => scrollMain(-1)}
            disabled={!mainScroll.canL}
            aria-label="向左捲動"
            style={{
              position: 'absolute', left: -16, top: '50%', transform: 'translateY(-50%)',
              zIndex: 2,
              width: 36, height: 36, borderRadius: '50%',
              background: '#fff', border: '1px solid #e8e8e8',
              boxShadow: '0 2px 8px rgba(0,0,0,.08)',
              cursor: mainScroll.canL ? 'pointer' : 'not-allowed',
              opacity: mainScroll.canL ? 1 : 0,
              transition: 'opacity .2s ease',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: 'inherit', color: '#262626',
              pointerEvents: mainScroll.canL ? 'auto' : 'none',
            }}>
            <span className="ay-icon ay-icon-line" style={{ fontSize: 22 }}>chevron_left</span>
          </button>
          {/* Right arrow */}
          <button
            onClick={() => scrollMain(1)}
            disabled={!mainScroll.canR}
            aria-label="向右捲動"
            style={{
              position: 'absolute', right: -16, top: '50%', transform: 'translateY(-50%)',
              zIndex: 2,
              width: 36, height: 36, borderRadius: '50%',
              background: '#fff', border: '1px solid #e8e8e8',
              boxShadow: '0 2px 8px rgba(0,0,0,.08)',
              cursor: mainScroll.canR ? 'pointer' : 'not-allowed',
              opacity: mainScroll.canR ? 1 : 0,
              transition: 'opacity .2s ease',
              display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
              fontFamily: 'inherit', color: '#262626',
              pointerEvents: mainScroll.canR ? 'auto' : 'none',
            }}>
            <span className="ay-icon ay-icon-line" style={{ fontSize: 22 }}>chevron_right</span>
          </button>

          <div
            ref={mainScrollerRef}
            className="seb-tab-scroller"
            style={{
              display: 'flex', gap: 10, overflowX: 'auto', scrollBehavior: 'smooth',
              scrollbarWidth: 'none', msOverflowStyle: 'none',
            }}>
            {mainTabs.map(t => {
              const active = mainTab === t.key;
              return (
                <button
                  key={t.key}
                  onClick={() => setMainTab(t.key)}
                  className="seb-main-tab"
                  style={{
                    position: 'relative',
                    background: active ? '#1e9fd2' : '#fff',
                    border: `1.5px solid ${active ? '#1e9fd2' : '#e8e8e8'}`,
                    borderRadius: stuck ? 100 : 8,
                    padding: stuck ? '8px 16px' : '14px 20px 12px',
                    cursor: 'pointer',
                    color: active ? '#fff' : '#262626',
                    fontFamily: 'inherit',
                    display: 'flex',
                    flexDirection: stuck ? 'row' : 'column',
                    alignItems: 'center', justifyContent: 'center',
                    gap: stuck ? 0 : 6,
                    whiteSpace: 'nowrap', flex: '0 0 auto',
                    minWidth: stuck ? 0 : 130,
                    boxShadow: active && !stuck ? '0 4px 12px rgba(30,159,210,.28)' : (active ? '0 2px 6px rgba(30,159,210,.2)' : '0 1px 2px rgba(0,0,0,.04)'),
                    transition: 'padding .2s ease, border-radius .2s ease',
                  }}>
                  {stuck ? (
                    <span className={`ay-icon ${active ? 'ay-icon-solid' : 'ay-icon-line'}`}
                          style={{ fontSize: 18, color: active ? '#fff' : '#1e9fd2', marginRight: 6 }}>{t.icon}</span>
                  ) : (
                    <span className={`ay-icon ${active ? 'ay-icon-solid' : 'ay-icon-line'}`}
                          style={{ fontSize: 30, color: active ? '#fff' : '#1e9fd2' }}>{t.icon}</span>
                  )}
                  <span style={{ fontSize: stuck ? 14 : 15, fontWeight: active ? 700 : 500 }}>{t.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </section>

      {/* Sentinel — drives stuck state for the sticky second tab bar */}
      <div ref={sentinelRef} style={{ height: 1 }}></div>

      {/* ===== Tier 2: secondTab — sticky anchor nav ===== */}
      {secondTabs.length > 0 && (
        <section
          style={{
            position: 'sticky', top: 0, zIndex: 30,
            background: '#fff',
            borderBottom: stuck ? '1px solid #e8e8e8' : '1px solid #f0f0f0',
            boxShadow: stuck ? '0 2px 8px rgba(0,0,0,.04)' : 'none',
            transition: 'box-shadow .2s ease',
          }}>
          <div
            ref={secondScrollerRef}
            className="seb-tab-scroller"
            style={{
              margin: '0 var(--seb-pad)',
              display: 'flex', alignItems: 'center', gap: 4, overflowX: 'auto',
              scrollbarWidth: 'none', msOverflowStyle: 'none',
            }}>
            {secondTabs.map(s => {
              const active = activeSection === s.key;
              return (
                <button
                  key={s.key}
                  data-stab={s.key}
                  onClick={() => onSecondTabClick(s.key)}
                  style={{
                    position: 'relative',
                    background: 'transparent',
                    border: 'none',
                    padding: '16px 18px 14px',
                    cursor: 'pointer',
                    color: active ? '#1e9fd2' : '#595959',
                    fontFamily: 'inherit',
                    fontSize: 15, fontWeight: active ? 700 : 500,
                    whiteSpace: 'nowrap', flex: '0 0 auto',
                    transition: 'color .15s ease',
                  }}>
                  {s.label}
                  {active && (
                    <span style={{
                      position: 'absolute', bottom: 0, left: 18, right: 18, height: 3,
                      background: '#1e9fd2', borderRadius: '3px 3px 0 0',
                    }}></span>
                  )}
                </button>
              );
            })}
          </div>
        </section>
      )}
    </React.Fragment>
  );
};

Object.assign(window, { FilterBarV4 });
</script>
<script type="text/babel">// Event card — curated sport event listing

// Split headline so every ★-prefixed bullet starts on its own line.
// Handles separators like "★A · ★B", "★A ★B", "★A、★B".
const splitHeadline = (text) => {
  if (!text) return [];
  if (!text.includes('★')) return [text];
  // Insert a sentinel before every ★ that is not at the start, then split.
  return text
    .replace(/\s*[·、,，]?\s*★/g, '\n★')
    .split('\n')
    .map(s => s.trim())
    .filter(Boolean);
};

// Card-level chip metadata (icons + display labels for badges shown on cards).
// Section-level chip filters use SEB_CHIP_LABELS; this map handles card badges.
const _CARD_CHIP_META = {
  hot:       { label: '熱銷中',       icon: 'local_fire_department' },
  pb:        { label: '追求 PB',     icon: 'speed' },
  beginner:  { label: '新手友善',     icon: 'sentiment_satisfied' },
  challenge: { label: '挑戰極限',     icon: 'military_tech' },
  super:     { label: '超級馬拉松',   icon: 'bolt' },
  tour:      { label: '包車/一日遊',  icon: 'directions_bus' },
  oneday:    { label: '一日遊',      icon: 'today' },
  spring:    { label: '4-6 月',      icon: 'local_florist' },
  summer:    { label: '7-9 月',      icon: 'wb_sunny' },
  autumn:    { label: '10-12 月',    icon: 'eco' },
  winter:    { label: '1-3 月',      icon: 'ac_unit' },
  // legacy keys kept for back-compat
  top100:    { label: '百大賽事',     icon: 'workspace_premium' },
  oncelife:  { label: '一生必去',     icon: 'auto_awesome' },
  stay:      { label: '含住宿',       icon: 'hotel' },
  major:     { label: '世界六大',     icon: 'military_tech' },
  earlybird: { label: '早鳥優惠',     icon: 'schedule' },
};
const chipLabel = (k) => (_CARD_CHIP_META[k]?.label) || (window.SEB_CHIP_LABELS?.[k]) || k;
const chipIcon  = (k) => (_CARD_CHIP_META[k]?.icon) || 'star';

const EventCard = ({ e }) => {
  const [imgOk, setImgOk] = React.useState(true);
  return (
    <div className="seb-card" style={{

            {e.badge}

      {/* Sold-out overlay */}
      {e.soldOut && (

          pointerEvents: 'none',
        }}>
          <div style={{

        </div>
      )}

      {/* Body */}
      <div style={{ padding: 18, display: 'flex', flexDirection: 'column', gap: 10, flex: 1 }}>
        {/* Chips — all chips show below image in one consistent color, left-aligned */}
        {/* Chips — show at most 2 on the card; rest collapse to “+N” */}
        {e.chips && e.chips.length > 0 && (
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'flex-start' }}>
            {e.chips.slice(0, 2).map(c => (
              <span key={c} style={{ display: 'inline-flex', alignItems: 'center', fontSize: 14, padding: '3px 7px', background: '#f0fdff', color: '#055885', borderRadius: 3, border: '1px solid #c7f7ff', fontWeight: 500 }}>
                {chipLabel(c)}

        )}

        {/* Title */}

              </span>
            ) : e.priceText ? (

            ) : (
              <span style={{ color: '#595959' }}>價格洽詢</span>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

// Coming-soon card — same structure as EventCard, but price slot replaced with "預計 XXXX.XX.XX 開賣"
// Bottom row keeps "XXX 人關注" + "通知我開賣" button
const ComingSoonCard = ({ e, onNotify, notified }) => {

  return (

            {e.chips.slice(0, 2).map(c => (
              <span key={c} style={{ display: 'inline-flex', alignItems: 'center', fontSize: 14, padding: '3px 7px', background: '#f0fdff', color: '#055885', borderRadius: 3, border: '1px solid #c7f7ff', fontWeight: 500 }}>
                {chipLabel(c)}
              </span>

          </div>

Object.assign(window, { EventCard, ComingSoonCard });

<script type="text/babel">// SEB v4 SectionGrid — renders one Section with heading, chip filter, and a
// 4×2 card grid (max 8 cards visible). If more cards exist behind a chip
// filter, "顯示更多 (N)" reveals them; "看全部 →" links out to the full
// category page.

const SectionGrid = ({ section, mainTabKey }) => {
  const labels = window.SEB_CHIP_LABELS;
  const [chip, setChip] = React.useState(section.chips[0] || 'all');
  const [showMore, setShowMore] = React.useState(false);

  // Reset chip + showMore when section changes (defensive)
  React.useEffect(() => {
    setChip(section.chips[0] || 'all');
    setShowMore(false);
  }, [section.id]);

  // Section-level chip filter. 'all' = no filter; other chips match against
  // event.chips OR event.region OR event.type (flexible match so operators
  // can use the same chip key for any axis).
  const filtered = React.useMemo(() => {
    if (chip === 'all') return section.events;
    return section.events.filter(e =>
      (e.chips || []).includes(chip) ||
      e.region === chip ||
      e.type === chip
    );
  }, [section.events, chip]);

  const VISIBLE = 8;
  const displayed = showMore ? filtered : filtered.slice(0, VISIBLE);
  const hiddenCount = Math.max(0, filtered.length - VISIBLE);

  return (
    <section
      id={section.id}
      data-section-id={section.id}
      style={{
        // Scroll-margin so anchor scrolling lands below sticky bars (60 site + ~52 secondTab)
        scrollMarginTop: 170,
        background: '#fff',
        padding: '40px var(--seb-pad) 16px',
      }}>
      <div style={{ maxWidth: '100%', margin: '0 auto' }}>

        {/* Heading row */}
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', gap: 16, marginBottom: 18, flexWrap: 'wrap' }}>
          <div>
            <h2 className="ay-h3" style={{ margin: 0, fontSize: 28, color: '#262626', letterSpacing: '-0.01em' }}>
              {section.title}
              <span style={{ fontSize: 15, color: '#8c8c8c', fontWeight: 500, marginLeft: 10 }}>
                {section.events.length} 場
              </span>
            </h2>
            {section.subtitle && (
              <p style={{ margin: '6px 0 0', fontSize: 14, color: '#595959' }}>{section.subtitle}</p>
            )}
          </div>

        </div>

        {/* Chip strip */}
        {section.chips && section.chips.length > 1 && (
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>
            {section.chips.map(c => {
              const active = chip === c;
              return (
                <button
                  key={c}
                  onClick={() => { setChip(c); setShowMore(false); }}
                  className="seb-chip"
                  style={{
                    padding: '7px 16px', borderRadius: 100,
                    border: `1px solid ${active ? '#1e9fd2' : '#e8e8e8'}`,
                    background: active ? '#e6f5fa' : '#fff',
                    color: active ? '#055885' : '#595959',
                    fontSize: 14, fontWeight: active ? 600 : 500,
                    cursor: 'pointer', fontFamily: 'inherit',
                    whiteSpace: 'nowrap',
                  }}>
                  {labels[c] || c}
                </button>
              );
            })}
          </div>
        )}

        {/* 4-col grid (8 cards visible, optionally expand) */}
        {displayed.length === 0 ? (
          <div style={{ background: '#fafafa', border: '1px dashed #d9d9d9', borderRadius: 8, padding: 48, textAlign: 'center', color: '#8c8c8c' }}>
            此分類目前沒有符合的賽事
          </div>
        ) : (
          <div
            key={`${section.id}-${chip}-${showMore}`}
            className="seb-fade-in"
            style={{ display: 'grid', gridTemplateColumns: 'repeat(var(--seb-cols), 1fr)', gap: 16 }}>
            {displayed.map(e => <EventCard key={e.id} e={e} />)}
          </div>
        )}

        {/* Show more / less toggle */}
        {hiddenCount > 0 && !showMore && (
          <div style={{ display: 'flex', justifyContent: 'center', marginTop: 20 }}>
            <button
              onClick={() => setShowMore(true)}
              style={{
                padding: '10px 24px', borderRadius: 4,
                border: '1px solid #e8e8e8', background: '#fff',
                color: '#262626', fontSize: 14, fontWeight: 500,
                fontFamily: 'inherit', cursor: 'pointer',
                display: 'inline-flex', alignItems: 'center', gap: 6,
              }}>
              顯示更多 ({hiddenCount})
              <span className="ay-icon ay-icon-line" style={{ fontSize: 18 }}>expand_more</span>
            </button>
          </div>
        )}
        {showMore && filtered.length > 8 && (
          <div style={{ display: 'flex', justifyContent: 'center', marginTop: 20 }}>
            <button
              onClick={() => setShowMore(false)}
              style={{
                padding: '10px 24px', borderRadius: 4,
                border: '1px solid #e8e8e8', background: '#fff',
                color: '#262626', fontSize: 14, fontWeight: 500,
                fontFamily: 'inherit', cursor: 'pointer',
                display: 'inline-flex', alignItems: 'center', gap: 6,
              }}>
              顯示更少
              <span className="ay-icon ay-icon-line" style={{ fontSize: 18 }}>expand_less</span>
            </button>
          </div>
        )}
      </div>
    </section>
  );
};

Object.assign(window, { SectionGrid });
</script>

<script type="text/babel">// SEB v4 App — three-tier composition
//
//   mainTab  →  switches the entire content (sections + secondTabs)
//   secondTab → anchor nav: smooth-scrolls to a Section
//   Section  →  has its own chip filter + 8-card grid
//
// Anchor logic:
//   - Click a secondTab → smooth-scroll to that section's element
//   - Scrollspy → as user scrolls, whichever section is closest to the
//     viewport top wins, updating active state on the secondTab bar.

const { useState, useMemo, useRef, useEffect, useCallback } = React;

function SebApp() {
  const [mainTab, setMainTab] = useState('hot');
  const [activeSection, setActiveSection] = useState(null);
  const [notified, setNotified] = useState(new Set());
  // Suppress scrollspy briefly after a click so it doesn't fight the
  // smooth-scroll animation.
  const suppressSpyUntilRef = useRef(0);

  const config = window.SEB_TAB_CONFIG[mainTab];
  const sections = config?.sections || [];

  // Reset active section to first when mainTab changes. Do NOT auto-scroll —
  // the user just wants the content to swap; their scroll position stays put.
  useEffect(() => {
    setActiveSection(sections[0]?.id || null);
  }, [mainTab]);

  // Scrollspy — find section closest to scroll line (just below sticky bars)
  useEffect(() => {
    const onScroll = () => {
      if (Date.now() < suppressSpyUntilRef.current) return;
      const scrollLine = 170; // sticky main tab bar approx
      const els = document.querySelectorAll('[data-section-id]');
      let best = null;
      let bestDist = Infinity;
      els.forEach(el => {
        const rect = el.getBoundingClientRect();
        // pick the section whose top is closest to (but not below) scrollLine
        const dist = Math.abs(rect.top - scrollLine);
        if (rect.bottom > scrollLine && dist < bestDist) {
          bestDist = dist;
          best = el.dataset.sectionId;
        }
      });
      if (best && best !== activeSection) setActiveSection(best);
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [activeSection, mainTab]);

  const handleSecondTabClick = useCallback((sectionId) => {
    const el = document.getElementById(sectionId);
    if (!el) return;
    setActiveSection(sectionId);
    suppressSpyUntilRef.current = Date.now() + 700;
    const top = el.getBoundingClientRect().top + window.scrollY - 170;
    window.scrollTo({ top, behavior: 'smooth' });
  }, []);

  const toggleNotify = (id) => {
    const s = new Set(notified);
    if (s.has(id)) s.delete(id); else s.add(id);
    setNotified(s);
  };

  return (
    <div data-screen-label="SEB Sport Activities v4">
      <SiteHeader />
      <Banner />
      <SebHeading />

      {/* Tier 1 + 2 nav */}
      <FilterBarV4
        mainTab={mainTab}
        setMainTab={setMainTab}
        activeSection={activeSection}
        onSecondTabClick={handleSecondTabClick}
      />

      {/* Sections — operator-defined per mainTab */}
      <div style={{ background: '#fff' }}>
        {sections.map(s => (
          <SectionGrid key={`${mainTab}-${s.id}`} section={s} mainTabKey={mainTab} />
        ))}
      </div>

      {/* Coming Soon — only visible when the 即將開放報名 mainTab is active and has items */}
      {mainTab === 'coming' && window.SEB_COMING_SOON.length > 0 && (
        <section
          id="coming-soon"
          style={{ background: '#fff', padding: '40px var(--seb-pad) 64px' }}>
          <div style={{ maxWidth: '100%', margin: '0 auto' }}>
            <div style={{ marginBottom: 18 }}>
              <h2 className="ay-h3" style={{ margin: 0, fontSize: 28, color: '#262626', letterSpacing: '-0.01em' }}>
                即將開放報名
                <span style={{ fontSize: 15, color: '#8c8c8c', fontWeight: 500, marginLeft: 10 }}>
                  {window.SEB_COMING_SOON.length} 場
                </span>
              </h2>
              <p style={{ margin: '6px 0 0', fontSize: 14, color: '#595959' }}>熱門賽事即將開賣，搶先開啟通知，第一時間掌握名額</p>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(var(--seb-cs-cols), 1fr)', gap: 16 }}>
              {window.SEB_COMING_SOON.map(e => (
                <ComingSoonCard key={e.id} e={e} onNotify={toggleNotify} notified={notified.has(e.id)} />
              ))}
            </div>
          </div>
        </section>
      )}

      <WhyAsiaYo />
      <FAQSection />
      <ContactSection />
      <SiteFooter />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SebApp />);
</script>
